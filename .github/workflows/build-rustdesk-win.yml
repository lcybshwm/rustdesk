name: Build RustDesk Windows Custom

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VCPKG_ROOT: C:\vcpkg

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Flutter Windows
        shell: pwsh
        run: |
          flutter config --enable-windows-desktop

      - name: Install vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV

      - name: Patch RustDesk default server
        shell: pwsh
        env:
          RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
          RELAY_SERVER: ${{ secrets.RELAY_SERVER }}
          RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
        run: |
          Write-Host "Patching RustDesk server config..."

          $files = Get-ChildItem -Recurse -File | Where-Object {
            $_.Name -eq "config.rs" -or $_.Name -eq "lib.rs"
          }

          foreach ($f in $files) {
            $content = Get-Content $f.FullName -Raw

            if ($content -match "DEFAULT_RENDEZVOUS_SERVER|DEFAULT_RS_PUB_KEY|RENDEZVOUS_SERVER") {
              Write-Host "Patching file: $($f.FullName)"

              $content = $content -replace 'pub const DEFAULT_RENDEZVOUS_SERVER: &str = ".*?";',
                                      "pub const DEFAULT_RENDEZVOUS_SERVER: &str = `"$env:RENDEZVOUS_SERVER`";"

              $content = $content -replace 'pub const DEFAULT_RELAY_SERVER: &str = ".*?";',
                                      "pub const DEFAULT_RELAY_SERVER: &str = `"$env:RELAY_SERVER`";"

              $content = $content -replace 'pub const DEFAULT_RS_PUB_KEY: &str = ".*?";',
                                      "pub const DEFAULT_RS_PUB_KEY: &str = `"$env:RS_PUB_KEY`";"

              $content = $content -replace 'const DEFAULT_RENDEZVOUS_SERVER: &str = ".*?";',
                                      "const DEFAULT_RENDEZVOUS_SERVER: &str = `"$env:RENDEZVOUS_SERVER`";"

              $content = $content -replace 'const DEFAULT_RELAY_SERVER: &str = ".*?";',
                                      "const DEFAULT_RELAY_SERVER: &str = `"$env:RELAY_SERVER`";"

              $content = $content -replace 'const DEFAULT_RS_PUB_KEY: &str = ".*?";',
                                      "const DEFAULT_RS_PUB_KEY: &str = `"$env:RS_PUB_KEY`";"

              Set-Content $f.FullName $content -Encoding UTF8
            }
          }

      - name: Build RustDesk
        shell: pwsh
        env:
          VCPKG_ROOT: C:\vcpkg
        run: |
          cargo build --release --target x86_64-pc-windows-msvc

      - name: Package portable exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item target\x86_64-pc-windows-msvc\release\rustdesk.exe dist\RustDesk-Custom-x64.exe

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y

      - name: Create installer
        shell: pwsh
        run: |
          @"
          [Setup]
          AppName=RustDesk Custom
          AppVersion=1.0.0
          DefaultDirName={autopf}\RustDesk Custom
          DefaultGroupName=RustDesk Custom
          OutputDir=dist
          OutputBaseFilename=RustDesk-Custom-x64-Setup
          Compression=lzma
          SolidCompression=yes
          ArchitecturesInstallIn64BitMode=x64
          PrivilegesRequired=admin

          [Files]
          Source: "target\x86_64-pc-windows-msvc\release\rustdesk.exe"; DestDir: "{app}"; Flags: ignoreversion

          [Icons]
          Name: "{group}\RustDesk Custom"; Filename: "{app}\rustdesk.exe"
          Name: "{commondesktop}\RustDesk Custom"; Filename: "{app}\rustdesk.exe"
          "@ | Set-Content installer.iss -Encoding UTF8

          iscc installer.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-Custom-Windows-x64
          path: |
            dist\RustDesk-Custom-x64.exe
            dist\RustDesk-Custom-x64-Setup.exe
